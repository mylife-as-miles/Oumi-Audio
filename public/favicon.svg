<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <linearGradient id="ring" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cc97ff"/>
      <stop offset="50%" stop-color="#699cff"/>
      <stop offset="100%" stop-color="#b1fe4d"/>
    </linearGradient>
    <linearGradient id="wave" x1="16" y1="32" x2="48" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cc97ff"/>
      <stop offset="100%" stop-color="#e7ffc4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer ring (brain/neural motif) -->
  <circle cx="32" cy="32" r="24" stroke="url(#ring)" stroke-width="2.5" fill="none" opacity="0.35"/>
  <circle cx="32" cy="32" r="20" stroke="url(#ring)" stroke-width="1" fill="none" opacity="0.15" stroke-dasharray="4 3"/>
  <!-- Audio waveform bars (center) -->
  <g filter="url(#glow)">
    <rect x="20" y="27" width="3" height="10" rx="1.5" fill="url(#wave)" opacity="0.7"/>
    <rect x="25" y="22" width="3" height="20" rx="1.5" fill="url(#wave)" opacity="0.85"/>
    <rect x="30" y="18" width="3" height="28" rx="1.5" fill="url(#wave)"/>
    <rect x="35" y="24" width="3" height="16" rx="1.5" fill="url(#wave)" opacity="0.9"/>
    <rect x="40" y="28" width="3" height="8"  rx="1.5" fill="url(#wave)" opacity="0.65"/>
  </g>
  <!-- Neural dots -->
  <circle cx="14" cy="20" r="1.5" fill="#cc97ff" opacity="0.5"/>
  <circle cx="50" cy="16" r="1.2" fill="#699cff" opacity="0.4"/>
  <circle cx="52" cy="46" r="1.8" fill="#b1fe4d" opacity="0.45"/>
  <circle cx="12" cy="44" r="1.3" fill="#cc97ff" opacity="0.35"/>
</svg>
